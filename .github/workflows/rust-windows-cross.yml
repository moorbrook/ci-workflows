name: rust-windows-cross

# Reusable workflow: `cargo xwin build --target x86_64-pc-windows-msvc`.
# Callers gate this on main-push to keep PRs fast.
#
# `uses: moorbrook/ci-workflows/.github/workflows/rust-windows-cross.yml@v1`

on:
  workflow_call:
    inputs:
      extra-args:
        description: "Extra cargo args (e.g. --features kiosk)"
        type: string
        default: ""

permissions: {}

jobs:
  xwin:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - run: rustup target add x86_64-pc-windows-msvc
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.7.5
      - run: cargo xwin build --target x86_64-pc-windows-msvc --workspace --locked ${{ inputs.extra-args }}
