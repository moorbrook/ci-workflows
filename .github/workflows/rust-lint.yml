name: rust-lint

# Reusable workflow: `cargo clippy` with -D warnings.
# Callers: `uses: moorbrook/ci-workflows/.github/workflows/rust-lint.yml@v1`

on:
  workflow_call:
    inputs:
      package-selection:
        description: >
          Cargo package selection. Default `--workspace` lints every workspace member.
          Callers with vendored `[patch.crates-io]` path deps should pass an explicit
          list (e.g. `-p crate1 -p crate2`) — path-patched deps don't get the
          `--cap-lints=warn` treatment that registry deps get, so `-D warnings` will
          escalate any upstream-style warnings in the patched tree.
        type: string
        default: "--workspace"
      extra-args:
        description: "Extra cargo clippy args (e.g. --features foo)"
        type: string
        default: ""
      clippy-allows:
        description: "Clippy lint allow flags. Default keeps pedantic+nursery quiet to match the moorbrook default."
        type: string
        default: "-A clippy::pedantic -A clippy::nursery"
      setup-commands:
        description: >
          Shell commands to run before cargo (e.g. apt-installing build deps
          like `protobuf-compiler` or `cmake`).
        type: string
        default: ""

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - if: inputs.setup-commands != ''
        run: ${{ inputs.setup-commands }}
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.7.5
      # --no-deps: don't lint deps (including path-patched `[patch.crates-io]`
      # deps, which otherwise get linted as if they were first-party code).
      - run: cargo clippy ${{ inputs.package-selection }} --all-targets --no-deps --locked ${{ inputs.extra-args }} -- -D warnings ${{ inputs.clippy-allows }}
