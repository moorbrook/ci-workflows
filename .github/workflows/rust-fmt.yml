name: rust-fmt

# Reusable workflow: `cargo fmt --all --check`.
# Callers: `uses: moorbrook/ci-workflows/.github/workflows/rust-fmt.yml@v1`

on:
  workflow_call:

permissions: {}

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check
