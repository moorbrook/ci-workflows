name: rust-fmt

# Reusable workflow: `cargo fmt --all --check`.
# Callers: `uses: moorbrook/ci-workflows/.github/workflows/rust-fmt.yml@v1`

on:
  workflow_call:
    inputs:
      package-selection:
        description: >
          Cargo package selection. Default `--all` formats every workspace member.
          Callers with vendored `[patch.crates-io]` path deps should pass an explicit
          list (e.g. `-p crate1 -p crate2`) to avoid sweeping upstream-style drift.
        type: string
        default: "--all"
      working-directory:
        description: >
          Directory the cargo commands run from (relative to repo root). Default
          `.` is correct for repos with `Cargo.toml` at the root. Set to a subdir
          (e.g. `search_app/backend`) when the Rust crate lives in a subdirectory.
        type: string
        default: "."

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - run: rustup component add rustfmt
      - run: cargo fmt ${{ inputs.package-selection }} --check
